name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  catalog:
    name: Python quality and catalog consistency
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q

      - name: Validate resource catalog
        run: python -m scripts.validate

      - name: Check generated README
        run: python -m scripts.build_readme --check

  links:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check links with Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress './**/*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
